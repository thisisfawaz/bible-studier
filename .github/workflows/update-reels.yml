name: Update Reels Playlist

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  # Manual trigger
  workflow_dispatch:

jobs:
  update-reels:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Fetch latest reels
        run: npm run fetch-reels
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          PLAYLIST_ID: ${{ secrets.PLAYLIST_ID }}
          
      - name: Check for changes
        id: git-check
        run: |
          git diff --quiet data/reels.json || echo "changed=true" >> $GITHUB_OUTPUT
          
      - name: Commit and push if changed
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/reels.json
          git commit -m "🤖 Update reels playlist"
          git push
